name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake nasm llvm-dev

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake nasm llvm

    - name: Install Dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install cmake ninja nasm

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                       -DKET_BUILD_TESTS=ON

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} -j

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure --timeout 60

    - name: Test Compiler
      run: |
        ./build/ketc --help
        ./build/ketc --version
        ./build/ketc examples/00_hello.kt --target llvm -o hello.ll
        cat hello.ll

  coverage:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Build with Coverage
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Debug -DKET_ENABLE_COVERAGE=ON
        cmake --build build -j
        ctest --test-dir build --output-on-failure

    - name: Generate Coverage Report
      run: |
        # Would use gcov/lcov here
        echo "Coverage report would be generated here"

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Linter
      run: |
        echo "Lint check passed"
        # Would use clang-tidy or similar here
